<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>1ボタン運命回避</title>
<style>
  body { margin:0; background:#111; color:white; text-align:center; }
  canvas { background:#000; display:block; margin:auto; }
</style>
</head>
<body>
<h2>押してる間だけ重力反転</h2>
<p>SPACE or クリック</p>
<canvas id="game" width="400" height="600"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let y = 300, vy = 0;
let gravity = 0.4;
let invert = false;
let walls = [];
let frame = 0;
let alive = true;
let start = Date.now();

document.onmousedown = document.onkeydown = () => invert = true;
document.onmouseup = document.onkeyup = () => invert = false;

function spawnWall() {
  let safeY = Math.random() * 400 + 50;
  walls.push({ x: 400, safeY });
}

function update() {
  if (!alive) return;

  frame++;
  if (frame % 90 === 0) spawnWall();

  vy += invert ? -gravity : gravity;
  y += vy;
  vy *= 0.98;

  if (y < 0 || y > 600) alive = false;

  walls.forEach(w => w.x -= 3);

  walls.forEach(w => {
    if (w.x < 60 && w.x > 40) {
      if (y < w.safeY - 40 || y > w.safeY + 40) alive = false;
    }
  });

  walls = walls.filter(w => w.x > -50);
}

function draw() {
  ctx.clearRect(0,0,400,600);

  // player
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.arc(50, y, 10, 0, Math.PI*2);
  ctx.fill();

  // walls
  ctx.fillStyle = "red";
  walls.forEach(w => {
    ctx.fillRect(w.x, 0, 20, w.safeY - 40);
    ctx.fillRect(w.x, w.safeY + 40, 20, 600);
  });

  if (!alive) {
    ctx.fillStyle = "white";
    ctx.font = "30px sans-serif";
    ctx.fillText("GAME OVER", 100, 300);
    ctx.font = "20px sans-serif";
    ctx.fillText(`生存時間 ${((Date.now()-start)/1000).toFixed(1)}秒`, 90, 340);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
